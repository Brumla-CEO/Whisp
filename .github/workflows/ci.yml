# .github/workflows/ci.yml
#
# CI Pipeline pro projekt Whisp
# Spustí se automaticky při každém push a Pull Requestu do main větve

name: Whisp CI Pipeline

# KDY se pipeline spustí:
on:
  push:
    branches: [ main, 'feat/**', 'fix/**' ]
  pull_request:
    branches: [ main ]                         # každý PR do main

jobs:

  # ═══════════════════════════════════════════════════════
  # JOB 1: Backend testy (PHP + PHPUnit)
  # ═══════════════════════════════════════════════════════
  backend-tests:
    name: "Backend – PHP Unit Tests"
    runs-on: ubuntu-latest

    # Spustí PostgreSQL jako service (stejně jako tvůj Docker)
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: whisp_user
          POSTGRES_PASSWORD: whisp_password
          POSTGRES_DB: whisp_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Krok 1: Stáhnout kód z repozitáře
      - name: Checkout kódu
        uses: actions/checkout@v4

      # Krok 2: Nainstalovat PHP 8.2
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_pgsql
          coverage: xdebug

      # Krok 3: Cache Composer závislostí zrychlí pipeline
      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}

      # Krok 4: Nainstalovat PHP závislosti
      - name: Instalace Composer závislostí
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      # Krok 5: Nastavit proměnné prostředí pro testy
      - name: Nastavení ENV proměnných
        run: |
          echo "JWT_SECRET=test-secret-key-min-32-characters-long-for-ci" >> $GITHUB_ENV
          echo "JWT_TTL_SECONDS=86400" >> $GITHUB_ENV
          echo "DB_HOST=localhost" >> $GITHUB_ENV
          echo "DB_NAME=whisp_db" >> $GITHUB_ENV
          echo "DB_USER=whisp_user" >> $GITHUB_ENV
          echo "DB_PASS=whisp_password" >> $GITHUB_ENV

      # Krok 6: Spustit unit testy
      - name: Spuštění PHPUnit testů
        working-directory: backend
        run: ./vendor/bin/phpunit --testdox --colors=always

      # Krok 7: Code Coverage report (volitelné)
      - name: Code Coverage report
        working-directory: backend
        run: ./vendor/bin/phpunit --coverage-text
        continue-on-error: true  # neblokuje pipeline pokud coverage nestačí

  # ═══════════════════════════════════════════════════════
  # JOB 2: Frontend testy (React + Vitest)
  # ═══════════════════════════════════════════════════════
  frontend-tests:
    name: "Frontend – React Unit Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      # Nainstalovat Node.js
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Nainstalovat npm závislosti
      - name: Instalace npm závislostí
        working-directory: frontend
        run: npm ci   # "ci" = čistá instalace přesně podle package-lock.json

      # Spustit Vitest testy
      - name: Spuštění Vitest testů
        working-directory: frontend
        run: npm test -- --run   # --run = jednorázově (ne watch mode)

      # Code Coverage
      - name: Code Coverage report
        working-directory: frontend
        run: npx vitest --coverage --run
        continue-on-error: true

  # ═══════════════════════════════════════════════════════
  # JOB 3: Docker Build check
  # Ověří že se Docker image vůbec postaví
  # ═══════════════════════════════════════════════════════
  docker-build:
    name: "Docker Build Check"
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]  # spustí se AŽ PO testech

    steps:
      - name: Checkout kódu
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build --no-cache

      - name: Ověření že kontejnery nastartují
        run: |
          docker compose up -d
          sleep 15
          docker compose ps
          docker compose down
