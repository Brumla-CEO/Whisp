version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: whisp_db
    environment:
      POSTGRES_USER: whisp_user
      POSTGRES_PASSWORD: whisp_password
      POSTGRES_DB: whisp_db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - whisp_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whisp_backend
    command: php -S 0.0.0.0:8000 -t /var/www/html/public /var/www/html/public/index.php
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: whisp_db
      DB_USER: whisp_user
      DB_PASS: whisp_password
      JWT_SECRET: change_this_to_a_long_random_secret_for_dev
      JWT_TTL_SECONDS: 86400
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      - db
    volumes:
      - ./backend:/var/www/html
    networks:
      - whisp_net

  websocket:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whisp_websocket
    command: php /var/www/html/bin/server.php
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_NAME: whisp_db
      DB_USER: whisp_user
      DB_PASS: whisp_password
      JWT_SECRET: change_this_to_a_long_random_secret_for_dev
      JWT_TTL_SECONDS: 86400
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      - db
      - backend
    volumes:
      - ./backend:/var/www/html
    networks:
      - whisp_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whisp_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
      - websocket
    networks:
      - whisp_net

volumes:
  db_data:

networks:
  whisp_net:
    driver: bridge